<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ali Wafir | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@800&display=swap');
        body { background: white; color: black; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .reveal { clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%); }
        .line { display: block; transform: translateY(150px); }
    </style>
</head>
<body>
    <div class="p-8 md:p-16">
        <header class="flex justify-between mb-32 opacity-0" id="nav">
            <div class="font-extrabold text-2xl tracking-tighter">ALI WAFIR</div>
            <div class="space-x-8 font-medium"><span>Work</span><span>About</span></div>
        </header>

        <h1 class="text-7xl md:text-[10rem] font-extrabold leading-[0.85] tracking-tighter uppercase">
            <span class="reveal"><span class="line">Digital</span></span>
            <span class="reveal"><span class="line">Product</span></span>
            <span class="reveal"><span class="line">Designer</span></span>
        </h1>
    </div>

    <script>
        window.addEventListener('load', () => {
            const tl = gsap.timeline();
            tl.to(".line", { y: 0, duration: 1.5, stagger: 0.2, ease: "power4.out" })
              .to("#nav", { opacity: 1, duration: 1 }, "-=1");
        });
    </script>
</body>
</html>
