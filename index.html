<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ali Wafir | Digital Designer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* Mengunci scroll untuk feel 'cover' majalah */
        }

        /* Tipografi Vertikal ala Foto */
        .vertical-text {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            transform: rotate(180deg);
        }

        .outline-text {
            color: transparent;
            -webkit-text-stroke: 1px rgba(255,255,255,0.3);
            transition: all 0.5s ease;
        }

        .outline-text:hover {
            color: #fff;
            -webkit-text-stroke: 1px #fff;
        }

        .reveal { clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%); }
        .line { display: block; transform: translateY(100%); }
        
        /* Garis pembatas tipis ala editorial */
        .border-thin { border-color: rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div class="h-screen w-full flex flex-col p-6 md:p-12">
        
        <header class="flex justify-between items-center mb-12 opacity-0" id="nav">
            <div class="text-xl font-black tracking-tighter uppercase">ALI WAFIR</div>
            <nav class="space-x-8 text-xs uppercase tracking-[0.2em] font-bold text-gray-400">
                <a href="#" class="hover:text-white transition-colors">Work</a>
                <a href="#" class="hover:text-white transition-colors">About</a>
                <a href="#" class="hover:text-white transition-colors">Contact</a>
            </nav>
        </header>

        <main class="flex-grow grid grid-cols-12 gap-4 border-t border-thin pt-12">
            
            <div class="col-span-2 md:col-span-1 flex items-end pb-8">
                <h2 class="vertical-text text-6xl md:text-8xl font-black tracking-tighter opacity-20 select-none">
                    PORTFOLIO
                </h2>
            </div>

            <div class="col-span-10 md:col-span-7 flex flex-col justify-end pb-8">
                <h1 class="text-[15vw] md:text-[12vw] font-black leading-[0.8] uppercase tracking-tighter">
                    <span class="reveal block"><span class="line outline-text">Digital</span></span>
                    <span class="reveal block"><span class="line">Product</span></span>
                    <span class="reveal block"><span class="line outline-text">Designer</span></span>
                </h1>
            </div>

            <div class="hidden md:col-span-4 md:flex flex-col justify-between border-l border-thin pl-12 pb-8">
                <div class="opacity-0" id="year-text">
                    <span class="text-xs tracking-[0.5em] text-gray-500 uppercase block mb-2">Established</span>
                    <span class="text-4xl font-light tracking-tighter italic">2026</span>
                </div>
                
                <div class="opacity-0 translate-y-10" id="subtext">
                    <p class="text-sm leading-relaxed text-gray-400 max-w-xs mb-8 uppercase tracking-widest">
                        Menciptakan solusi digital yang berani dan berdampak tinggi. Berbasis di Indonesia.
                    </p>
                    <div class="w-12 h-[1px] bg-white opacity-50"></div>
                </div>
            </div>
        </main>

    </div>

    <script>
        window.addEventListener('load', () => {
            const tl = gsap.timeline({ defaults: { ease: "expo.out" } });

            tl.to(".line", { 
                y: 0, 
                duration: 2, 
                stagger: 0.2 
            })
            .to("#nav, #subtext, #year-text", { 
                opacity: 1, 
                y: 0, 
                duration: 1.5,
                stagger: 0.1
            }, "-=1.5");
        });
    </script>
</body>
</html>
