<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ali Wafir | Digital Product Designer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #000000;
            overflow-x: hidden;
        }

        /* Menyiapkan teks untuk efek reveal (tersembunyi dulu) */
        .reveal {
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%);
        }
        
        .line {
            display: block;
            transform: translateY(100px);
            transition: transform 0.1s ease;
        }

        .nav-link {
            position: relative;
            overflow: hidden;
        }
        
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background-color: currentColor;
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.4s ease;
        }

        .nav-link:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }
    </style>
</head>
<body class="antialiased">

    <div class="max-w-[1600px] mx-auto px-6 py-8 md:px-12 md:py-16">
        
        <header class="flex justify-between items-center mb-24 md:mb-40 opacity-0" id="header">
            <a href="#" class="text-2xl font-extrabold tracking-tighter">ALI WAFIR</a>
            <nav class="flex gap-8 text-lg font-medium">
                <a href="#work" class="nav-link">Work</a>
                <a href="#about" class="nav-link">About</a>
                <a href="#contact" class="nav-link">Contact</a>
            </nav>
        </header>

        <section class="mb-24 md:mb-40">
            <h1 class="text-6xl sm:text-7xl md:text-9xl lg:text-[11rem] font-extrabold tracking-tighter leading-[0.9] max-w-7xl uppercase">
                <span class="reveal"><span class="line">Digital</span></span>
                <span class="reveal"><span class="line">Product</span></span>
                <span class="reveal"><span class="line">Designer</span></span>
            </h1>
            <div class="opacity-0 translate-y-10 mt-12" id="hero-desc">
                <p class="text-2xl text-gray-700 max-w-3xl leading-relaxed">
                    Halo, saya Ali Wafir. Seorang desainer produk digital yang fokus pada penciptaan pengalaman pengguna yang intuitif dan bermakna.
                </p>
            </div>
        </section>

        <section id="work" class="mb-24 md:mb-40 opacity-0" id="work-section">
            <h2 class="text-sm uppercase tracking-widest text-gray-500 mb-8 border-b border-gray-200 pb-4">Selected Work</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-16">
                <a href="#" class="group space-y-5 block">
                    <div class="aspect-[16/10] bg-gray-100 overflow-hidden">
                        <img src="https://images.unsplash.com/photo-1558655146-d09347e92766?q=80&w=1000" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
                    </div>
                    <div class="flex justify-between items-start border-t border-transparent group-hover:border-gray-200 pt-4 transition-all">
                        <div>
                            <h3 class="text-3xl font-bold tracking-tight">Project Title</h3>
                            <p class="text-gray-600 mt-1">UX Research & UI Design</p>
                        </div>
                        <span class="text-2xl group-hover:translate-x-2 transition-transform">→</span>
                    </div>
                </a>
            </div>
        </section>
    </div>

    <script>
        // Logika Animasi GSAP
        window.addEventListener('load', () => {
            const tl = gsap.timeline({ defaults: { ease: "power4.out" } });

            // 1. Animasi Teks Reveal (Satu per satu)
            tl.to(".line", {
                y: 0,
                duration: 1.5,
                stagger: 0.2
            });

            // 2. Munculkan Header dan Deskripsi secara halus
            tl.to("#header, #hero-desc", {
                opacity: 1,
                y: 0,
                duration: 1,
                stagger: 0.2
            }, "-=1");

            // 3. Munculkan bagian Work
            tl.to("#work", {
                opacity: 1,
                duration: 1
            }, "-=0.5");
        });
    </script>
</body>
</html>
